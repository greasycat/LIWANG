<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
  <div class="w-16 h-16 rounded-2xl bg-primary text-primary-content flex items-center justify-center mb-5 shadow-md">
    <span class="text-lg font-semibold tracking-tight">LIWANG</span>
  </div>
  <h1 class="text-2xl font-semibold tracking-tight">问任何关于公司的问题</h1>
  <p class="mt-2 text-sm opacity-60">基于内部 SOP、BOM、规范、培训材料、流程文件</p>

  <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-2.5 w-full max-w-2xl">
    {% for sample in [
      "焊接气孔率超标的复检流程?",
      "型号 A123 的注塑温度区间?",
      "302 不锈钢的认可替代供应商?",
      "新员工入职手续清单?"
    ] %}
      <button
        class="text-left px-4 py-3 rounded-xl border border-base-300 hover:border-primary hover:bg-base-100 transition-colors text-sm"
        @click="(() => { const ta = document.querySelector('#composer textarea'); ta.value = '{{ sample }}'; ta.dispatchEvent(new Event('input', { bubbles: true })); ta.focus(); })()">
        {{ sample }}
      </button>
    {% endfor %}
  </div>
</div>
