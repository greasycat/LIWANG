<div class="p-3 border-b border-base-300 space-y-2">
  <form hx-post="/sessions" hx-swap="none" hx-on::after-request="if(event.detail.successful){const id = event.detail.xhr.getResponseHeader('HX-Redirect'); if(id) window.location.href = id;}">
    <button class="btn btn-primary btn-sm w-full gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
      新对话
    </button>
  </form>
  <label class="input input-sm input-bordered flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 10a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
    <input type="text" name="q" placeholder="搜索对话" class="grow"
           hx-get="/sessions/search" hx-trigger="input changed delay:200ms" hx-target="#session-list" />
  </label>
</div>

<nav id="session-list" class="flex-1 overflow-y-auto px-2 py-2 scroll-shadow">
  {% include "_session_list.html" %}
</nav>

<div class="p-3 border-t border-base-300 text-xs opacity-60">
  <div class="flex items-center justify-between">
    <span>v0.1 · 演示数据</span>
    <kbd class="kbd kbd-xs">⌘K</kbd>
  </div>
</div>
