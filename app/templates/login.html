<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · LIWANG的学习助手</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4 font-sans">
  <div class="card w-full max-w-sm bg-base-100 shadow-xl">
    <div class="card-body">
      <div class="text-center mb-3">
        <div class="w-12 h-12 rounded-xl bg-primary text-primary-content flex items-center justify-center mx-auto mb-3">
          <span class="text-sm font-semibold">LIWANG</span>
        </div>
        <h1 class="text-lg font-semibold">登录 LIWANG的学习助手</h1>
        <p class="text-xs opacity-60 mt-1">使用账号</p>
      </div>

      {% if error %}
        <div class="alert alert-error text-sm py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="space-y-3">
        <label class="form-control">
          <div class="label py-1"><span class="label-text text-xs">用户名</span></div>
          <input type="text" name="username" required autofocus class="input input-bordered input-sm" />
        </label>
        <label class="form-control">
          <div class="label py-1"><span class="label-text text-xs">密码</span></div>
          <input type="password" name="password" required class="input input-bordered input-sm" />
        </label>
        <button class="btn btn-primary btn-sm w-full">登录</button>
      </form>

      <div class="divider text-[10px] opacity-40">演示账号</div>
      <div class="text-[11px] opacity-60 space-y-0.5 font-mono">
        <div>admin / admin (管理员)</div>
        <div>alice / alice (R&D)</div>
        <div>bob / bob (QA)</div>
      </div>
    </div>
  </div>
</body>
</html>
