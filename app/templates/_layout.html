<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" x-data="{ sidebar: true, drawer: false }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LIWANG 知识助手{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: {
        extend: {
          fontFamily: {
            sans: ['system-ui', '-apple-system', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <script defer src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script defer src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <!-- Alpine plugins must load BEFORE the core -->
  <script defer src="https://unpkg.com/@alpinejs/persist@3.14.3/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    .chat-bubble-user { background: oklch(var(--p) / 0.12); border: 1px solid oklch(var(--p) / 0.25); }
    .prose :where(p):not(:where([class~="not-prose"] *)) { margin: 0.4em 0; }
    .scroll-shadow { background-attachment: local, local, scroll, scroll;
      background-image:
        linear-gradient(white, white),
        linear-gradient(white, white),
        linear-gradient(to bottom, rgba(0,0,0,0.05), transparent),
        linear-gradient(to top, rgba(0,0,0,0.05), transparent);
      background-position: top, bottom, top, bottom;
      background-repeat: no-repeat;
      background-size: 100% 1.5em, 100% 1.5em, 100% 1em, 100% 1em; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-base-200 text-base-content font-sans antialiased">

  {% include "_topbar.html" %}

  <div class="drawer md:drawer-open">
    <input id="sidebar-drawer" type="checkbox" class="drawer-toggle" x-model="drawer" />
    <div class="drawer-content flex flex-col" style="height: calc(100vh - 56px);">
      {% block main %}{% endblock %}
    </div>
    <aside class="drawer-side z-30" style="height: calc(100vh - 56px); top: 56px;"
           x-data="{ width: $persist(288).as('sidebar-width'), dragging: false }">
      <label for="sidebar-drawer" class="drawer-overlay"></label>
      <div x-bind:style="{ width: width + 'px' }"
           x-bind:class="dragging ? 'select-none' : ''"
           class="relative h-full bg-base-100 border-r border-base-300 flex flex-col">
        {% block sidebar %}
          {% include "_sidebar.html" %}
        {% endblock %}

        {# drag handle — full-height strip on the right edge #}
        <div class="hidden md:block absolute top-0 -right-0.5 h-full w-1 cursor-col-resize z-40
                    hover:bg-primary/40 transition-colors"
             :class="dragging ? 'bg-primary/60' : ''"
             @mousedown.prevent="
               dragging = true;
               const startX = $event.clientX;
               const startW = width;
               const move = e => { width = Math.max(220, Math.min(560, startW + e.clientX - startX)); };
               const up = () => {
                 dragging = false;
                 document.removeEventListener('mousemove', move);
                 document.removeEventListener('mouseup', up);
               };
               document.addEventListener('mousemove', move);
               document.addEventListener('mouseup', up);
             "
             @dblclick="width = 288"
             title="拖拽调整宽度（双击重置）"></div>
      </div>
    </aside>
  </div>

  <div x-data="{
         toasts: [],
         show(msg, kind='error', ttl=4000) {
           const id = Date.now() + Math.random();
           this.toasts.push({ id, msg, kind });
           setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, ttl);
         },
       }"
       @htmx:response-error.window="(e => {
         const xhr = e.detail.xhr;
         const code = xhr.status;
         let msg;
         if (code === 404) msg = '未找到资源（页面可能已过期，请刷新）';
         else if (code === 403) msg = '无权访问';
         else if (code === 413) msg = '配额不足';
         else if (code >= 500) msg = `服务器错误 (HTTP ${code})`;
         else msg = `请求失败 (HTTP ${code})`;
         show(msg);
       })($event)"
       @htmx:send-error.window="show('网络错误：服务器无响应')"
       class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
    <template x-for="t in toasts" :key="t.id">
      <div class="alert pointer-events-auto shadow-lg max-w-sm"
           :class="{ 'alert-error': t.kind === 'error', 'alert-warning': t.kind === 'warning', 'alert-info': t.kind === 'info' }">
        <span class="text-sm" x-text="t.msg"></span>
      </div>
    </template>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
