<div id="docs-table" class="card bg-base-100 border border-base-300 shadow-sm overflow-hidden">
  <div class="overflow-x-auto">
    <table class="table table-sm">
      <thead class="text-xs uppercase tracking-wider opacity-70 bg-base-200">
        <tr>
          <th class="w-8">
            <input type="checkbox" class="checkbox checkbox-xs"
                   :checked="selected.size > 0 && selected.size === document.querySelectorAll('[data-doc-row]').length"
                   :indeterminate="selected.size > 0 && selected.size < document.querySelectorAll('[data-doc-row]').length"
                   @change="selectAll($event.target.checked)" />
          </th>
          <th>文件名</th>
          <th>部门</th>
          <th>类型</th>
          <th>版本</th>
          <th>生效日期</th>
          <th>访问</th>
          <th class="text-center">仅检索</th>
          <th class="text-right">切片</th>
          <th>状态</th>
          <th class="w-20"></th>
        </tr>
      </thead>
      <tbody>
        {% for d in docs %}
          {% include "admin/_doc_row.html" %}
        {% endfor %}
        {% if not docs %}
          <tr><td colspan="11" class="text-center py-12 opacity-50 text-sm">无文档</td></tr>
        {% endif %}
      </tbody>
    </table>
  </div>
</div>
