<div id="upload-table" class="card bg-base-100 border border-base-300 shadow-sm overflow-hidden">
  <div class="overflow-x-auto">
    <table class="table table-sm">
      <thead class="text-xs uppercase tracking-wider opacity-70 bg-base-200">
        <tr>
          <th class="w-8">
            <input type="checkbox" class="checkbox checkbox-xs"
                   :checked="selected.size > 0 && selected.size === document.querySelectorAll('[data-upload-row]').length"
                   :indeterminate="selected.size > 0 && selected.size < document.querySelectorAll('[data-upload-row]').length"
                   @change="selectAll($event.target.checked)" />
          </th>
          <th>文件名</th>
          <th>大小</th>
          <th>部门</th>
          <th>类型</th>
          <th>版本</th>
          <th>访问</th>
          <th class="text-center">仅检索</th>
          <th>状态</th>
          <th class="w-20"></th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
          {% include "admin/_upload_row.html" %}
        {% endfor %}
        {% if not items %}
          <tr>
            <td colspan="10" class="text-center py-12 opacity-50 text-sm">
              暂无文件 · 拖拽文件到上方上传
            </td>
          </tr>
        {% endif %}
      </tbody>
    </table>
  </div>
</div>
